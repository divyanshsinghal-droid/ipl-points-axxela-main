services:
  - type: web
    name: ipl-fantasy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-fantasy-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # update after Vercel deploy
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false   # set manually in Render dashboard

databases:
  - name: ipl-fantasy-db
    databaseName: ipl_fantasy
    plan: free
